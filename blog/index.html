<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog – Bad Lasagna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&family=Coiny&display=swap" rel="stylesheet">
 <!-- Use absolute paths  -->
  <link rel="stylesheet" href="/main.css">
  <link rel="icon" type="image/png" href="/img/favicon.png">
</head>
<body>
<div class="page-wrapper">
  <header class="hero">
      <div class="logo-group">
        <a href="/">
          <img src="/img/logo-no-background.png" alt="Bad Lasagna Logo" class="logo-img" />
        </a>
        <h1 class="site-title">BAD LASAGNA Comic</h1>
      </div>
  </header>
  <main>
    <h2>All Blog Posts</h2>
    <div id="blog-list" class="archive-list"></div>
  </main>
</div>
<script>
async function loadBlog() {
  const response = await fetch("/blog/blog.json");
  const posts = await response.json();

  const container = document.getElementById("blog-list");

  posts.forEach(post => {
    // Pretty URL if slug exists
    const url = post.slug
      ? `/blog/${post.slug}/`
      : `/blog/post.html?p=${post.num}`;

    // Thumbnail fallback
    const thumb = post.thumb || "/blog/posts/default.svg";

    const item = document.createElement("a");
    item.href = url;
    item.className = "archive-item archive-link";

    item.innerHTML = `
      <div class="archive-item-inner">
        <img src="${thumb}" class="archive-thumb" alt="${post.title} thumbnail">
        <div class="archive-meta">
          <span class="archive-title">${post.title}</span>          
        </div>
      </div>
    `;

    container.appendChild(item);
  });
}

loadBlog();
</script>

  <!-- Footer -->
  <footer class="footer">
    <div class="newsletter">
      <h2>Let's be friends.</h2>
        <p>
          Follow Bad Lasagna Comic on the social media for new comic pages, 
          behind-the-scenes notes, and announcements.
        </p>
    </div>
    <div class="social-icons">
      <a href="https://ko-fi.com/badlasagna"><img src="/img/kofi_symbol.png" alt="ko-fi logo" class="ko-fi-logo social-icon"</a>
      <a href="https://instagram.com/cynscreativedesk"><img src="/img/instagram.png" alt="Instagram icons courtesy of Flaticon" class="instagram-icon social-icon"</a>
      <a href="mailto:hello@badlasagna.com"><img src="/img/mail.png" alt="Mail icons courtesy of Flaticon" class="mail-icon social-icon"</a>
    </div>
    <nav class="nav-buttons">
      <a href="/about" class="btn btn-yellow">About</a>
      <a href="/archive" class="btn btn-yellow">Go to Comic</a>
      <a href="https://ko-fi.com/badlasagna" class="btn btn-pink">Support My Comic!</a>
    </nav>
    <p class="footer-note">© 2025 - Today: Bad Lasagna. All rights reserved.</p>    
    </footer>
</body>
</html>
