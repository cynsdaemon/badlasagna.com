<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog – Bad Lasagna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&family=Coiny&display=swap" rel="stylesheet">

 <!-- Use absolute paths  -->
  <link rel="stylesheet" href="/main.css">
  <link rel="icon" type="image/png" href="/img/favicon.png">


  <!-- Lightweight Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
</head>

<body>
<div class="page-wrapper">

  <header class="hero">
      <div class="logo-group">
        <a href="/">
          <img src="/img/logo-no-background.png" alt="Bad Lasagna Logo" class="logo-img" />
        </a>
        <h1 class="site-title">BAD LASAGNA Comic</h1>
      </div>
  </header>

  <main>
    <article id="blog-content" class="blog-content"></article>
  </main>

  <nav class="nav-buttons">
    <a href="/blog" class="btn btn-purple">Back to Blog</a>
  </nav>

</div>

<script>
async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  let postNum = params.get("p");

  // If no ?p=001, try slug from URL
  if (!postNum) {
    const slug = window.location.pathname
      .split("/")
      .filter(Boolean)
      .pop();

    const metaRes = await fetch("/blog/blog.json");
    const posts = await metaRes.json();

    const match = posts.find(p => p.slug === slug);
    if (match) {
      postNum = match.num;
    }
  }

  if (!postNum) {
    document.getElementById("blog-content").innerHTML =
      "<p>Post not found.</p>";
    return;
  }

  // Load metadata
  const metaRes = await fetch("/blog/blog.json");
  const posts = await metaRes.json();
  const postMeta = posts.find(p => p.num === postNum);

  if (!postMeta) {
    document.getElementById("blog-content").innerHTML =
      "<p>Post not found.</p>";
    return;
  }

  // Load markdown file
  const mdRes = await fetch(`/blog/posts/${postNum}.md`);
  const mdText = await mdRes.text();

  // Convert markdown → HTML
  const converter = new showdown.Converter();
  const html = converter.makeHtml(mdText);

  // Render final blog post
  const container = document.getElementById("blog-content");
  container.innerHTML = `
    <h1>${postMeta.title}</h1>
    <p class="archive-date">${postMeta.date}</p>
    ${html}
  `;

  /* ---------------------------------------------------------
   LINK CLASSIFIER (with Ko-fi exception)
   --------------------------------------------------------- */
const links = container.querySelectorAll("a");

links.forEach(link => {
  const href = link.getAttribute("href");
  if (!href) return;

  // Explicit Ko-fi exception
  const isKoFi = href.startsWith("https://ko-fi.com/");

  // Internal link rules
  const isInternal =
    !isKoFi && (
      href.startsWith("/") ||
      href.startsWith("#") ||
      href.includes("heycynwrites") ||
      href.includes("badlasagna")
    );

  if (isInternal) {
    link.classList.add("internal-link");
  } else {
    link.classList.add("external-link");
    link.setAttribute("target", "_blank");
    link.setAttribute("rel", "noopener noreferrer");
  }
});

}



loadPost();
</script>
