<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog – Bad Lasagna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&family=Coiny&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../main.css">
  <link rel="icon" type="image/png" href="/img/bl-favicon.png">

  <!-- Lightweight Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
</head>

<body>
<div class="page-wrapper">

  <header class="hero">
    <div class="logo-group">
      <img src="/img/logo-no-background.png" alt="Bad Lasagna Logo" class="logo-img">
      <h1 class="site-title">BAD LASAGNA Blog</h1>
    </div>
  </header>

  <main>
    <article id="blog-content" class="blog-content"></article>
  </main>

  <nav class="nav-buttons">
    <a href="/blog/index.html" class="btn btn-purple">Back to Blog</a>
    <a href="/archive/page.html?p=latest" class="btn btn-pink">Latest Comic</a>
  </nav>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let postNum = params.get("p");

if (!postNum) postNum = "001";

fetch("blog.json")
  .then(res => res.json())
  .then(posts => {
    const post = posts.find(p => p.num === postNum);
    if (!post) {
      document.getElementById("blog-content").innerHTML = "<p>Post not found.</p>";
      return;
    }

    fetch(`posts/${postNum}.md`)
      .then(res => res.text())
      .then(md => {
        const converter = new showdown.Converter();
        const html = converter.makeHtml(md);
        document.getElementById("blog-content").innerHTML = html;
      });
  });
</script>

</body>
</html>
